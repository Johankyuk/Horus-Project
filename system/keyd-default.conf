# Kyu OS — keyd: la tecla Super (Windows) tocada sola abre el launcher de Noctalia,
# y mantenida sigue funcionando como modificador Super para todos los binds Mod+X.
# Se despliega a /etc/keyd/default.conf. Servicio: systemctl enable --now keyd
[ids]
*

[main]
# overload(meta, f13): mantener = Super; tocar y soltar sola = emite F13.
# Niri bindea F13 -> launcher (ver keybinds.kdl).
leftmeta = overload(meta, f13)
