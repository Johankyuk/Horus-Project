[main]
font=monospace:size=11
shell=/bin/bash
# Margen interno entre el borde de la ventana y el texto. Con esquinas redondeadas
# (geometry-corner-radius 20 + clip-to-geometry en Niri) un pad chico deja el texto
# pegado/recortado por la curva; 14x14 le da aire. Sube/baja a gusto.
pad=14x14
# foot elige la paleta por defecto con initial-color-theme (dark / light). Dark
# ya es el default, pero lo fijamos explícito para que el morado aplique siempre,
# incluso sin portal de esquema (TTY, ISO live).
initial-color-theme=dark

# Paleta morada Kyu OS. foot >= 1.23 reemplazó la sección [colors] (deprecada,
# era la del spam "use [colors-dark] instead") por [colors-dark] / [colors-light].
# Como siempre quieres morado oscuro, basta [colors-dark]: initial-color-theme=dark
# hace que foot la tome por defecto.
[colors-dark]
# alpha<1 = fondo translúcido; con el blur de Niri esto define cuánto se difumina
# (más bajo = se nota más el desenfoque). 0.70 deja leer el blur sin perder texto.
alpha=0.70
background=1a1025
foreground=e1d5e7

regular0=1a1025
regular1=cf6679
regular2=7b4fa0
regular3=a855f7
regular4=6d28d9
regular5=c084fc
regular6=e9d5ff
regular7=e1d5e7

bright0=2d1b40
bright1=f48fb1
bright2=9d6ac9
bright3=ce93d8
bright4=7c4dff
bright5=d8b4fe
bright6=f3e8ff
bright7=ffffff
