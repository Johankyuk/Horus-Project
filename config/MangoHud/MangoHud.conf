# MangoHud — Horus (fuente Morada; horus-theme rota los hex al aplicar tema)
# Overlay compacto: FPS, frametime, GPU/CPU (carga+temp), VRAM/RAM.

legacy_layout=false
position=top-right
round_corners=8
font_size=20
background_alpha=0.55
alpha=0.95

# Colores (RRGGBB sin '#')
background_color=18092b
text_color=ffffff
gpu_color=8b45f7
cpu_color=c44fe6
vram_color=8b45f7
ram_color=c44fe6
engine_color=c44fe6
io_color=8b45f7
frametime_color=8b45f7
media_player_color=c44fe6
wine_color=c44fe6
battery_color=c44fe6

# Metricas
fps
frametime=1
frame_timing
gpu_stats
gpu_temp
gpu_power
cpu_stats
cpu_temp
vram
ram
gamemode

# Mostrar/ocultar el overlay en juego
toggle_hud=Shift_R+F12
